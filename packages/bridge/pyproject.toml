[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hiri-bridge"
version = "0.2.47"
description = "HIRI bridge: Home Assistant MQTT discovery + multi-device smart home bridge"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "MergeOS / ThanhTrucSolutions" }]
dependencies = [
  "typer>=0.12",
  "rich>=13.7",
  "pydantic>=2.6",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "ruff>=0.4", "httpx>=0.27"]
api = ["fastapi>=0.110", "uvicorn>=0.27", "httpx>=0.27"]
mqtt = ["paho-mqtt>=2.0"]

[project.scripts]
hiri-bridge = "hiri_bridge.cli:app"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"
