; HIRI Firmware — ESP32 / ESP8266 optimized MQTT → Home Assistant
[env]
framework = arduino
monitor_speed = 115200
lib_deps =
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^7.0.0

[env:esp32dev]
platform = espressif32
board = esp32dev
build_flags = -DHIRI_BOARD_ESP32

[env:esp32dev_tls]
platform = espressif32
board = esp32dev
build_flags =
  -DHIRI_BOARD_ESP32
  -DHIRI_MQTT_TLS=1

[env:esp8266]
platform = espressif8266
board = nodemcuv2
build_flags = -DHIRI_BOARD_ESP8266

[env:esp8266_tls]
platform = espressif8266
board = nodemcuv2
build_flags =
  -DHIRI_BOARD_ESP8266
  -DHIRI_MQTT_TLS=1
